<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAS Webhook</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: #f4f6f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
        }
        .container {
            background: white; padding: 40px 30px; border-radius: 16px; width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow-y: auto; max-height: 90vh; position: relative;
        }
        .logout-btn {
            position: absolute; top: 20px; right: 20px; text-decoration: none; color: #ef4444; 
            font-size: 13px; font-weight: 600; padding: 6px 12px; border-radius: 20px; background-color: #fef2f2;
        }
        .logo { display: block; width: 80px; height: 80px; margin: 0 auto 20px auto; border-radius: 18px; object-fit: cover; }
        h2 { text-align: center; margin-bottom: 25px; color: #2c3e50; font-size: 22px; }
        .group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #5c6b7f; margin-bottom: 6px; }
        input {
            width: 100%; padding: 12px; border: 1px solid #e1e4e8; border-radius: 8px; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; 
            cursor: pointer; font-size: 16px; margin-top: 15px;
        }
        .hint { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        .success { background: #d1fae5; color: #065f46; padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        hr { border: 0; border-top: 1px dashed #e2e8f0; margin: 20px 0; }
        .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #94a3b8; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/logout" class="logout-btn">退出 ⏻</a>
        <img src="https://raw.githubusercontent.com/autunn/nas-webhook/main/logo.png" alt="Logo" class="logo">
        <h2>微信推送配置</h2>
        {{if .success}}<div class="success">✅ 配置已保存！请去企业微信测试</div>{{end}}
        <form action="/save" method="post">
            <div class="group"><label>企业ID (CorpID)</label><input type="text" name="corpid" value="{{.config.CorpID}}" required></div>
            <div class="group"><label>应用ID (AgentID)</label><input type="text" name="agentid" value="{{.config.AgentID}}" required></div>
            <div class="group"><label>应用密钥 (Secret)</label><input type="password" name="corpsecret" value="{{.config.CorpSecret}}" required></div>
            <hr>
            <div class="group"><label>接收消息 Token</label><input type="text" name="token" value="{{.config.Token}}" required></div>
            <div class="group"><label>接收消息 AESKey</label><input type="text" name="encoding_aes_key" value="{{.config.EncodingAESKey}}" required></div>
            <hr>
            <div class="group"><label>NAS 跳转地址</label><input type="text" name="nas_url" value="{{.config.NasURL}}"><div class="hint">点击通知后跳转的地址</div></div>
            <div class="group"><label>图片 API (可选)</label><input type="text" name="photo_url" value="{{.config.PhotoURL}}"></div>
            <button type="submit">保存配置</button>
        </form>
        <div class="footer">NAS Webhook {{.version}}</div>
    </div>
</body>
</html>
