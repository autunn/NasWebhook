<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>登录 - NAS Webhook</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #f4f6f9; font-family: sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; }
        .container { background: white; width: 320px; padding: 40px; border-radius: 16px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .logo { width: 64px; height: 64px; margin-bottom: 20px; border-radius: 12px; }
        h2 { margin-bottom: 30px; color: #2c3e50; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #e1e4e8; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .error { color: #ef4444; font-size: 14px; margin-bottom: 15px; }
        .footer { margin-top: 20px; font-size: 12px; color: #cbd5e1; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://raw.githubusercontent.com/autunn/nas-webhook/main/logo.png" class="logo">
        <h2>身份验证</h2>
        {{if .error}}<div class="error">{{.error}}</div>{{end}}
        <form action="/login" method="post">
            <input type="password" name="password" placeholder="请输入管理密码" required>
            <button type="submit">登 录</button>
        </form>
        <div class="footer">v {{.version}}</div>
    </div>
</body>
</html>
